name: ThimbleTray
options:
  bundleIdPrefix: com.shimondeitel.thimbletray
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  groupSortPosition: top
settings:
  base:
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.0"
    DEVELOPMENT_TEAM: "W7Q885Q59C"
    CODE_SIGN_STYLE: Automatic
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    TARGETED_DEVICE_FAMILY: "1"
    ENABLE_USER_SCRIPT_SANDBOXING: "YES"
targets:
  ThimbleTray:
    type: application
    platform: iOS
    sources:
      - path: ThimbleTray
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.thimbletray
        TARGETED_DEVICE_FAMILY: "1"
        INFOPLIST_FILE: ThimbleTray/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        ENABLE_PREVIEWS: "YES"
        GENERATE_INFOPLIST_FILE: "NO"
  ThimbleTrayTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: ThimbleTrayTests
      - path: ThimbleTray.storekit
    dependencies:
      - target: ThimbleTray
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.thimbletray.tests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
  ThimbleTrayUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: ThimbleTrayUITests
    dependencies:
      - target: ThimbleTray
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.thimbletray.uitests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
schemes:
  ThimbleTray:
    build:
      targets:
        ThimbleTray: all
        ThimbleTrayTests: [test]
        ThimbleTrayUITests: [test]
    run:
      config: Debug
      storeKitConfiguration: ThimbleTray.storekit
    test:
      config: Debug
      storeKitConfiguration: ThimbleTray.storekit
      targets:
        - ThimbleTrayTests
        - ThimbleTrayUITests
    archive:
      config: Release
